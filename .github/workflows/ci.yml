name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel in-flight runs on main — a fast follow-up merge would
  # otherwise discard the merge-commit's gate run.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version

      - name: Cache pre-commit hook envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Sync workspace
        # `--frozen` forbids re-resolving: CI installs exactly what `uv.lock`
        # pins, so a stale lock surfaces as a sync failure instead of a silent
        # in-CI resolve that diverges from local installs.
        run: uv sync --frozen --all-packages

      - name: Pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: mypy
        run: uv run mypy

      - name: Pytest
        # In CI, Rich force-enables colors (it detects the CI=true env)
        # and splits flag names like `--verbosity` into two styled spans
        # — `\e[36m-\e[0m\e[36m-verbosity\e[0m` — so the literal
        # substring `--verbosity` no longer appears in `result.output`.
        # A handful of integration tests assert flag names appear in
        # CliRunner output and break under that. NO_COLOR disables
        # Rich's color rendering so substring assertions work; COLUMNS
        # widens the rendered panel so flag listings aren't word-wrapped
        # mid-name. The underlying fragility (CliRunner invocations
        # should pin `terminal_width` and strip ANSI before substring
        # checks) is worth a follow-up issue.
        env:
          NO_COLOR: "1"
          COLUMNS: "200"
        run: uv run pytest
