name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel in-flight runs on main — a fast follow-up merge would
  # otherwise discard the merge-commit's gate run.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version

      - name: Cache pre-commit hook envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Sync workspace
        # `--frozen` forbids re-resolving: CI installs exactly what `uv.lock`
        # pins, so a stale lock surfaces as a sync failure instead of a silent
        # in-CI resolve that diverges from local installs.
        run: uv sync --frozen --all-packages

      - name: Pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: mypy
        run: uv run mypy

      - name: Pytest
        # CI runners have no TTY, so `shutil.get_terminal_size()` falls
        # back to 80 cols and Rich-rendered Typer help panels truncate
        # long flag names. A handful of integration tests assert flag
        # names appear in `--help` output and break under that. Setting
        # COLUMNS here matches a typical local terminal and unblocks CI;
        # the underlying width-fragility (CliRunner invocations should
        # pin `terminal_width`) is tracked as a follow-up.
        env:
          COLUMNS: "200"
        run: uv run pytest
