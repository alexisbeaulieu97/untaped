name: Release Smoke

"on":
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  release-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          version: "0.11.19"
          enable-cache: true

      - name: Configure temp paths
        run: |
          mkdir -p "$RUNNER_TEMP/home/.local/bin" "$RUNNER_TEMP/data"
          {
            echo "HOME=$RUNNER_TEMP/home"
            echo "XDG_DATA_HOME=$RUNNER_TEMP/data"
            echo "UNTAPED_CONFIG=$RUNNER_TEMP/untaped-config.yml"
          } >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/home/.local/bin" >> "$GITHUB_PATH"

      - name: Install current core with migration plugin stack
        run: |
          scripts/install.sh --editable .
          untaped plugins add \
            "untaped-awx @ git+https://github.com/alexisbeaulieu97/untaped-awx@cyclopts-migration" \
            "untaped-workspace @ git+https://github.com/alexisbeaulieu97/untaped-workspace@cyclopts-migration" \
            "untaped-ansible @ git+https://github.com/alexisbeaulieu97/untaped-ansible@cyclopts-migration" \
            "untaped-jira @ git+https://github.com/alexisbeaulieu97/untaped-jira@cyclopts-migration" \
            "untaped-profile @ git+https://github.com/alexisbeaulieu97/untaped-profile@cyclopts-migration" \
            "untaped-themes @ git+https://github.com/alexisbeaulieu97/untaped-themes@cyclopts-migration"
          test -x "$HOME/.local/bin/untaped"

      - name: Verify plugin discovery
        run: |
          expected="$(mktemp)"
          actual="$(mktemp)"
          cat > "$expected" <<'EOF'
          ansible
          awx
          github
          jira
          profile
          themes
          workspace
          EOF
          untaped plugins list --format raw --columns plugin_id | sort > "$actual"
          diff -u "$expected" "$actual"

      - name: Verify skill discovery
        run: |
          expected="$(mktemp)"
          actual="$(mktemp)"
          cat > "$expected" <<'EOF'
          untaped
          untaped-ansible
          untaped-awx
          untaped-github
          untaped-jira
          untaped-profile
          untaped-workspace
          EOF
          untaped skills list --format raw --columns name > "$actual"
          diff -u "$expected" "$actual"

      - name: Verify local agent skill installation
        run: |
          project_dir="$RUNNER_TEMP/project"
          mkdir -p "$project_dir"
          untaped skills install --all --target all --scope local --project-dir "$project_dir"
          for skill in \
            untaped \
            untaped-ansible \
            untaped-awx \
            untaped-github \
            untaped-jira \
            untaped-profile \
            untaped-workspace
          do
            test -f "$project_dir/.agents/skills/$skill/SKILL.md"
            test -f "$project_dir/.agents/skills/$skill/.untaped-skill.json"
            test -f "$project_dir/.claude/skills/$skill/SKILL.md"
            test -f "$project_dir/.claude/skills/$skill/.untaped-skill.json"
          done
