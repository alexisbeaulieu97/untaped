[project]
name = "untaped-awx"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "Alexis Beaulieu", email = "alexisbeaulieu97@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "jinja2>=3.1.6",
    "pydantic>=2.13.3",
    "pyyaml>=6.0.3",
    "typer>=0.25.1",
    "untaped",
]

[project.entry-points."untaped.plugins"]
awx = "untaped_awx.plugin:plugin"

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
untaped = { workspace = true }
