name: "Ansible Tower Projects API"
version: "v2"
base_path: "/api/v2/projects"

endpoints:
  list:
    method: GET
    path: "/"
    description: "List all projects"
    parameters:
      query:
        page:
          type: integer
          description: "Page number for pagination"
        page_size:
          type: integer
          description: "Number of results per page"
        search:
          type: string
          description: "Search filter"
        name:
          type: string
          description: "Filter by project name"
        organization:
          type: integer
          description: "Filter by organization ID"
        scm_type:
          type: string
          description: "Filter by SCM type"
    response:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/Project"

  get:
    method: GET
    path: "/{id}/"
    description: "Get a specific project"
    parameters:
      path:
        id:
          type: integer
          required: true
          description: "Project ID"
    response:
      $ref: "#/components/schemas/Project"

  update:
    method: POST
    path: "/{id}/update/"
    description: "Update a project from SCM"
    parameters:
      path:
        id:
          type: integer
          required: true
          description: "Project ID"
    response:
      $ref: "#/components/schemas/ProjectUpdate"

  playbooks:
    method: GET
    path: "/{id}/playbooks/"
    description: "Get playbooks in a project"
    parameters:
      path:
        id:
          type: integer
          required: true
          description: "Project ID"
    response:
      type: array
      items:
        type: string

components:
  schemas:
    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        local_path:
          type: string
        scm_type:
          type: string
          enum: ["", "git", "hg", "svn", "insights"]
        scm_url:
          type: string
        scm_branch:
          type: string
        scm_refspec:
          type: string
        scm_clean:
          type: boolean
        scm_delete_on_update:
          type: boolean
        credential:
          type: integer
        timeout:
          type: integer
        organization:
          type: integer
        scm_update_on_launch:
          type: boolean
        scm_update_cache_timeout:
          type: integer
        allow_override:
          type: boolean
        custom_virtualenv:
          type: string
        default_environment:
          type: integer
        signature_validation_credential:
          type: integer
        last_job_run:
          type: string
          format: date-time
        last_job_failed:
          type: boolean
        next_job_run:
          type: string
          format: date-time
        status:
          type: string
          enum:
            [
              "new",
              "pending",
              "waiting",
              "running",
              "successful",
              "failed",
              "error",
              "canceled",
              "never updated",
              "ok",
              "missing",
            ]
        scm_revision:
          type: string
        created:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time

    ProjectUpdate:
      type: object
      properties:
        id:
          type: integer
        project:
          type: integer
        name:
          type: string
        description:
          type: string
        local_path:
          type: string
        scm_type:
          type: string
        scm_url:
          type: string
        scm_branch:
          type: string
        scm_refspec:
          type: string
        scm_clean:
          type: boolean
        scm_delete_on_update:
          type: boolean
        credential:
          type: integer
        timeout:
          type: integer
        scm_revision:
          type: string
        status:
          type: string
          enum:
            [
              "new",
              "pending",
              "waiting",
              "running",
              "successful",
              "failed",
              "error",
              "canceled",
            ]
        failed:
          type: boolean
        started:
          type: string
          format: date-time
        finished:
          type: string
          format: date-time
        canceled_on:
          type: string
          format: date-time
        elapsed:
          type: number
        job_explanation:
          type: string
        launch_type:
          type: string
        created:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time
