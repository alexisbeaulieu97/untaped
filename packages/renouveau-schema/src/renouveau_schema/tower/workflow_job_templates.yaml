name: "Ansible Tower Workflow Job Templates API"
version: "v2"
base_path: "/api/v2/workflow_job_templates"

endpoints:
  list:
    method: GET
    path: "/"
    description: "List all workflow job templates"
    parameters:
      query:
        page:
          type: integer
          description: "Page number for pagination"
        page_size:
          type: integer
          description: "Number of results per page"
        search:
          type: string
          description: "Search filter"
        name:
          type: string
          description: "Filter by workflow name"
        organization:
          type: integer
          description: "Filter by organization ID"
    response:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowJobTemplate"

  get:
    method: GET
    path: "/{id}/"
    description: "Get a specific workflow job template"
    parameters:
      path:
        id:
          type: integer
          required: true
          description: "Workflow job template ID"
    response:
      $ref: "#/components/schemas/WorkflowJobTemplate"

  workflow_nodes:
    method: GET
    path: "/{id}/workflow_nodes/"
    description: "Get workflow nodes for a workflow job template"
    parameters:
      path:
        id:
          type: integer
          required: true
          description: "Workflow job template ID"
      query:
        page:
          type: integer
          description: "Page number for pagination"
        page_size:
          type: integer
          description: "Number of results per page"
    response:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"

  launch:
    method: POST
    path: "/{id}/launch/"
    description: "Launch a workflow job template"
    parameters:
      path:
        id:
          type: integer
          required: true
          description: "Workflow job template ID"
      body:
        type: object
        properties:
          extra_vars:
            type: object
            description: "Extra variables for the workflow"
          inventory:
            type: integer
            description: "Inventory ID to use"
    response:
      $ref: "#/components/schemas/WorkflowJob"

components:
  schemas:
    WorkflowJobTemplate:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        extra_vars:
          type: string
        organization:
          type: integer
        survey_enabled:
          type: boolean
        allow_simultaneous:
          type: boolean
        ask_variables_on_launch:
          type: boolean
        ask_inventory_on_launch:
          type: boolean
        ask_scm_branch_on_launch:
          type: boolean
        ask_limit_on_launch:
          type: boolean
        webhook_service:
          type: string
        webhook_credential:
          type: integer
        last_job_run:
          type: string
          format: date-time
        last_job_failed:
          type: boolean
        next_job_run:
          type: string
          format: date-time
        status:
          type: string
        created:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time

    WorkflowNode:
      type: object
      properties:
        id:
          type: integer
        workflow_job_template:
          type: integer
        unified_job_template:
          type: integer
        success_nodes:
          type: array
          items:
            type: integer
        failure_nodes:
          type: array
          items:
            type: integer
        always_nodes:
          type: array
          items:
            type: integer
        all_parents_must_converge:
          type: boolean
        identifier:
          type: string
        extra_data:
          type: object
        inventory:
          type: integer
        scm_branch:
          type: string
        job_type:
          type: string
        job_tags:
          type: string
        skip_tags:
          type: string
        limit:
          type: string
        diff_mode:
          type: boolean
        verbosity:
          type: integer
        created:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time

    WorkflowJob:
      type: object
      properties:
        id:
          type: integer
        workflow_job_template:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            [
              "new",
              "pending",
              "waiting",
              "running",
              "successful",
              "failed",
              "error",
              "canceled",
            ]
        failed:
          type: boolean
        started:
          type: string
          format: date-time
        finished:
          type: string
          format: date-time
        elapsed:
          type: number
        job_explanation:
          type: string
        launch_type:
          type: string
        canceled_on:
          type: string
          format: date-time
        created:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time
