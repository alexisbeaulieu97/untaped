# Install pre-commit and pre-push hooks together so the mypy pre-push
# gate fires without contributors needing to remember
# ``pre-commit install --hook-type pre-push``.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        # ``examples/`` ships Jinja2-templated YAML (e.g. test-deploy-app.yml)
        # that isn't valid plain YAML before rendering.
        exclude: ^examples/
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Strict-mypy gate at push time. Mypy is slow enough that running
      # it per-commit discourages frequent commits; ``pre-push`` catches
      # regressions before CI without paying the cost on every commit.
      # ``uv run mypy`` reuses the project venv so the local invocation
      # matches CI exactly.
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        files: '\.py$|^pyproject\.toml$'
        stages: [pre-push]
