# Install pre-commit and pre-push hooks together so the mypy pre-push
# gate fires without contributors needing to remember
# ``pre-commit install --hook-type pre-push``.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        # ``examples/`` ships Jinja2-templated YAML (e.g. test-deploy-app.yml)
        # that isn't valid plain YAML before rendering.
        exclude: ^examples/
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: sync-domains-check
        name: sync-domains (--check)
        # Fails when the five Import Linter + mypy domain lists drift
        # from `[tool.untaped].domains`. Fix with
        # `uv run python scripts/sync_domains.py --write`.
        entry: uv run python scripts/sync_domains.py --check
        language: system
        pass_filenames: false
        files: '^pyproject\.toml$'

      - id: lint-imports
        name: lint-imports (import-linter)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        # Trigger on Python edits and on `pyproject.toml` (where the
        # `[tool.importlinter]` config lives) — a config edit alone must
        # still re-run the contracts.
        files: '\.py$|^pyproject\.toml$'

      # Strict-mypy gate at push time. Mypy is slow enough that running
      # it per-commit discourages frequent commits; ``pre-push`` catches
      # regressions before CI without paying the cost on every commit.
      # ``uv run mypy`` reuses the workspace venv so the local invocation
      # matches CI exactly. Trigger mirrors ``lint-imports`` above so a
      # ``[tool.mypy]`` config edit alone re-runs the gate.
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        files: '\.py$|^pyproject\.toml$'
        stages: [pre-push]
